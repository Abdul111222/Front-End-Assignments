<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HOME</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="navbar">
        <div class="logo-container">
            <img src="https://www.junaidjamshed.com/media/logo/stores/1/j._logo_1.png" alt="J. Logo" class="logo">
        </div>
        <nav>
            <ul class="nav-links">
                <li><a href="#">HOME</a></li>
                <li><a href="#fragrances">FRAGRANCES</a></li>
                <li><a href="#shoes">SHOES</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section id="fragrances" class="container">
            <h2 class="section-heading">Fragrances</h2>
            
            <div class="product-grid">
                <article class="product-card">
                    <div class="card-img-wrapper">
                        <img src="https://www.junaidjamshed.com/media/catalog/product/j/a/janan_-1_1__2.jpg?optimize=medium&bg-color=255,255,255&fit=bounds&height=755&width=589&canvas=589:755&dpr=2">

                    <div class="card-details">
                        <p class="brand-name">J. Fragrance</p>

                </article>

                <article class="product-card">
                    <div class="card-img-wrapper">

                    </div>
                    <div class="card-details">
                        <p class="brand-name">J. Fragrance</p>
                        <h3 class="item-name">Vocal Pour Homme</h3>
                        <p class="item-price">Rs. 4,200</p>
                        <button class="buy-btn">Add to Cart</button>
                    </div>
                </article>
            </div>
            <div class="collection-link">
                <a href="#">View All Fragrances</a>
            </div>
        </section>

                    </div>
                    <div class="card-details">
                        <p class="brand-name">J. Shoes</p>
                        <h3
